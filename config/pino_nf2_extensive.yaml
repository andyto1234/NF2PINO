---
base_path: "runs/pino_nf2_hybrid/nf2"
work_directory: "runs/pino_nf2_hybrid/work"
logging:
  mode: disabled
data:
  type: fits
  slices:
    - fits_path:
        Br: "{%Br}"
        Bt: "{%Bt}"
        Bp: "{%Bp}"
      load_map: false
      bin: 4
  z_range: [0, 40]
  num_workers: 0
  iterations: 1000
  random_config:
    batch_size: 4096
  validation_batch_size: 8192
  log_shape: true
model:
  type: b
  dim: 128
  n_layers: 6
training:
  epochs: 20
  validation_interval: 200
  loss_config:
    - type: boundary
      name: boundary
      lambda: {start: 300.0, end: 30.0, iterations: 1200}
      ds_id: [boundary_01, potential]
    - type: force_free
      lambda: 0.1
    - type: divergence
      lambda: 0.1
  pino_init:
    steps: 10000
    batch_size: 8192
    max_samples: 120000
    stride: [4, 4, 4]
    lr: 0.0015
    strong_field_percentile: 85
    strong_field_weight: 10.0
    bottom_weight: 5.0
